<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Student Management</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- LOGIN VIEW -->
  <section id="login-view" class="view">
    <div class="card auth-card">
      <h1>Bus Student Management</h1>
      <p class="subtitle">Sign in to manage students</p>
      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />

        <button type="submit">Login</button>
        <p id="login-error" class="error hidden"></p>
      </form>
    </div>
  </section>

  <!-- DASHBOARD VIEW -->
  <section id="dashboard-view" class="view hidden">
    <header class="topbar">
      <h1>Bus Student Management</h1>
      <div>
        <span id="current-user"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <main class="container">
      <div class="card">
        <h2 id="form-title">Add Student</h2>
        <form id="student-form">
          <input type="hidden" id="student-id" />
          <div class="grid">
            <div>
              <label for="name">Name</label>
              <input type="text" id="name" required />
            </div>
            <div>
              <label for="roll_no">Roll No.</label>
              <input type="text" id="roll_no" required />
            </div>
            <div>
              <label for="department">Department</label>
              <input type="text" id="department" required />
            </div>
            <div>
              <label for="bus_route">Bus Route</label>
              <input type="text" id="bus_route" required />
            </div>
            <div>
              <label for="fee_status">Fee Status</label>
              <select id="fee_status">
                <option value="unpaid">Unpaid</option>
                <option value="pending">Pending</option>
                <option value="paid">Paid</option>
              </select>
            </div>
            <div>
              <label for="phone">Phone (optional)</label>
              <input type="text" id="phone" />
            </div>
            <div class="full-width">
              <label for="address">Address (optional)</label>
              <input type="text" id="address" />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" id="submit-btn">Add Student</button>
            <button type="button" id="cancel-edit-btn" class="secondary hidden">Cancel</button>
          </div>
          <p id="form-error" class="error hidden"></p>
        </form>
      </div>

      <div class="card">
        <div class="list-header">
          <h2>Students</h2>
          <div class="filters">
            <input type="text" id="search-input" placeholder="Search by name or roll no." />
            <select id="filter-fee-status">
              <option value="">All fee statuses</option>
              <option value="paid">Paid</option>
              <option value="pending">Pending</option>
              <option value="unpaid">Unpaid</option>
            </select>
            <button id="refresh-btn" class="secondary">Refresh</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Roll No.</th>
                <th>Department</th>
                <th>Bus Route</th>
                <th>Fee Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="students-tbody">
              <!-- rows injected by js/app.js -->
            </tbody>
          </table>
          <p id="empty-state" class="hidden">No students found.</p>
        </div>
      </div>
    </main>
  </section>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
